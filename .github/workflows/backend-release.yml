name: Backend Build and Release

on:
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-release.yml'
  push:
    branches:
      - main
      - 'hotfix/**'

permissions:
  contents: write
  packages: write

concurrency:
  group: backend-release-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-backend

jobs:
  validate-build:
    name: Validate and build backend
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Run tests and package
        working-directory: backend
        run: mvn --batch-mode --no-transfer-progress verify

  publish-image:
    name: Publish backend image
    needs: validate-build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/hotfix/'))
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=0.0.${{ github.run_number }}
            type=ref,event=branch
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}

  create-github-release:
    name: Create GitHub release
    needs: publish-image
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/hotfix/'))
    runs-on: ubuntu-latest

    steps:
      - name: Create release for published image
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          VERSION: 0.0.${{ github.run_number }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          RELEASE_TAG="v$VERSION"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "GitHub Release $RELEASE_TAG already exists."
            exit 0
          fi

          gh release create "$RELEASE_TAG" \
            --target "$COMMIT_SHA" \
            --title "Backend $RELEASE_TAG" \
            --notes "Published container image: \`$IMAGE:$VERSION\`\n\nSource branch: \`$BRANCH_NAME\`"
