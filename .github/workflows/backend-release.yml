name: Backend Build and Release

on:
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-release.yml'
  push:
    branches:
      - main
      - 'hotfix/**'

permissions:
  contents: write
  packages: write

concurrency:
  group: backend-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    uses: itsmearunbethini/workflow_templates/.github/workflows/java-backend-release.yml@main
